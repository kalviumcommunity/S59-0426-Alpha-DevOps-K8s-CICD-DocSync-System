# DocSync — production-style Deployment (Sprint #3 · A-16 / 4.21)
# ClusterIP / NodePort Services in k8s/service.yaml and k8s/service-nodeport.yaml select Pods with label { app: docsync } — keep in sync with template.metadata.labels.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  # name: used by kubectl as deployment/docsync
  name: docsync
  labels:
    app: docsync
    version: v1.2.0
spec:
  # replicas: minimum 2 for HA; must stay in sync with resource headroom on your cluster
  replicas: 2
  # revisionHistoryLimit: how many old ReplicaSets to retain for kubectl rollout undo / history
  revisionHistoryLimit: 5
  # progressDeadlineSeconds: time allowed before the Deployment reports ProgressDeadlineExceeded
  progressDeadlineSeconds: 600
  selector:
    # matchLabels: MUST match template.metadata.labels — Service uses the same app label
    matchLabels:
      app: docsync
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # maxUnavailable: pods that may be down during rollout (0 = no voluntary loss below desired count)
      maxUnavailable: 0
      # maxSurge: extra pods above desired count during rollout
      maxSurge: 1
  template:
    metadata:
      labels:
        app: docsync
        version: v1.2.0
    spec:
      containers:
        - name: docsync
          # Replace ghcr.io/username with your GHCR org or user for a successful pull
          image: ghcr.io/username/docsync:v1.2.0
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
