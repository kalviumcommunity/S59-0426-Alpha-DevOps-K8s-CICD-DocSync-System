# DocSync — NodePort Service (Sprint #3 · A-17 / 4.22)
# Same selector as ClusterIP; additionally exposes a high port on every Node for external/LAN testing.
# nodePort is omitted so Kubernetes assigns a free port in the default range (typically 30000–32767).
---
apiVersion: v1
kind: Service
metadata:
  name: docsync-nodeport
  labels:
    app: docsync
    sprint.kalvium.dev/component: nodeport
spec:
  type: NodePort
  selector:
    app: docsync
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
      # nodePort: (optional) pin e.g. 30080 — left unset to avoid collisions across clusters
