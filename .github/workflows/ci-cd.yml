name: DocSync CI/CD Pipeline
# A-20 / Assignments 4.37–4.40: GitHub Actions CI, Docker build automation, GHCR push, optional CD scaffold.
# Security: GHCR auth uses only secrets.GITHUB_TOKEN with packages:write. Never print tokens.
# Optional cluster apply: set repository secret KUBECONFIG_B64 (base64 of kubeconfig). If unset, deploy prints scaffold only.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ───────────────────────────────────────────────
  # CI — pull_request + push: validate source before any image work
  # ───────────────────────────────────────────────

  ci:
    name: "CI: Checkout → Install → Lint → Test"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Unit tests
        run: npm test

  # ───────────────────────────────────────────────
  # Docker — push to main only: immutable image → GHCR
  # ───────────────────────────────────────────────

  build-and-push:
    name: "Docker: Build → Push GHCR"
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GITHUB_TOKEN)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + OCI labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=short,prefix=

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Record image summary (no secrets)
        run: |
          {
            echo "## GHCR image published"
            echo ""
            echo "**Tags:** ${{ steps.meta.outputs.tags }}"
            echo "**Digest:** ${{ steps.build.outputs.digest }}"
            echo "**Commit:** ${{ github.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

  # ───────────────────────────────────────────────
  # CD scaffold — push to main only; live kubectl if KUBECONFIG_B64 exists
  # ───────────────────────────────────────────────

  deploy-and-verify:
    name: "CD: Deploy scaffold (optional live apply)"
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy / verify (scaffold or optional kubectl)
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
        run: |
          set -euo pipefail
          IMAGE_REF="${{ needs.build-and-push.outputs.image-tag }}"
          DIGEST="${{ needs.build-and-push.outputs.image-digest }}"

          if [ -n "${KUBECONFIG_B64}" ]; then
            echo "::group::Optional live apply (KUBECONFIG_B64 is configured)"
            mkdir -p ~/.kube
            umask 077
            echo "$KUBECONFIG_B64" | base64 -d > ~/.kube/config

            KVER=$(curl -fsSL https://dl.k8s.io/release/stable.txt)
            curl -fsSL -o /tmp/kubectl "https://dl.k8s.io/release/${KVER}/bin/linux/amd64/kubectl"
            chmod +x /tmp/kubectl
            sudo mv /tmp/kubectl /usr/local/bin/kubectl
            kubectl version --client

            kubectl apply -f k8s/deployment.yaml
            kubectl apply -f k8s/service.yaml
            kubectl rollout status deployment/docsync --timeout=120s
            echo "::endgroup::"
          else
            echo "No KUBECONFIG_B64 repository secret — CD scaffold only (no cluster credentials required)."
            echo ""
            echo "Production-style steps would include:"
            echo "  kubectl apply -f k8s/deployment.yaml"
            echo "  kubectl apply -f k8s/service.yaml"
            echo ""
            echo "Image tags from build job (reference only):"
            echo "  ${IMAGE_REF}"
            echo "  digest: ${DIGEST}"
            echo ""
            echo "Verification would include: kubectl rollout status, /health checks, and log tail."
          fi

      - name: CD summary
        run: |
          {
            echo "## CD stage"
            echo "Deploy/verify step completed (scaffold or optional live apply)."
          } >> "$GITHUB_STEP_SUMMARY"
